name: Build and Deploy eShopOnWeb Public API

on:
  push:
    branches:
      - main  # or your deploy branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore src/PublicApi/PublicApi.csproj

      - name: Build Project
        run: dotnet build src/PublicApi/PublicApi.csproj --configuration Release --no-restore

      - name: Publish Project
        run: dotnet publish src/PublicApi/PublicApi.csproj --configuration Release --output ./publish_output --no-build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: <your-app-service-name>  # replace this
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish_output
